# Production-like local override — no bind-mounts, no debug tools, uses
# the final `runtime` image stage (gunicorn + uvicorn workers) instead of
# the hot-reloading `dev` stage.
#
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up
#
# This is NOT what actually runs in Azure — Container Apps/App Service run
# the same image built from the `runtime` stage directly (pulled from
# ACR), with Postgres/Redis replaced by their managed Azure equivalents
# via env vars. This override just lets you exercise the production image
# shape locally.

services:
  api:
    image: asset-pilot-fastapi-api:prod
    build:
      target: runtime
    env_file:
      - .env.production
    volumes: []
    restart: always

  postgres:
    ports: []
    restart: always

  redis:
    ports: []
    restart: always
