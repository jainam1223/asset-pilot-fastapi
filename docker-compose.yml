x-common-env: &common-env
  env_file:
    - .env.development

services:
  api:
    image: asset-pilot-fastapi-api:dev
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    <<: *common-env
    environment:
      REDIS_HOST: redis
    extra_hosts:
      # Lets the container reach Postgres running on your host machine
      # when DATABASE_URL uses host.docker.internal as its hostname, via
      # the Docker-provided gateway IP — needed on Linux; Docker Desktop
      # (Mac/Windows) resolves this name natively but the entry is
      # harmless there too.
      - "host.docker.internal:host-gateway"
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      - ./app:/app/app
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
      - ./tests:/app/tests
      - ./scripts:/app/scripts
      - ./pyproject.toml:/app/pyproject.toml
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health/live', timeout=3).status == 200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      # REDIS_HOST_PORT (not REDIS_PORT) controls the HOST-side port —
      # same reasoning as DATABASE_HOST_PORT above. Defaults to 6380
      # since a local Redis install commonly already holds 6379.
      - "${REDIS_HOST_PORT:-6380}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    profiles: ["tools"]
    restart: unless-stopped

  redis-commander:
    image: rediscommander/redis-commander:latest
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis
    profiles: ["tools"]
    restart: unless-stopped

volumes:
  redis_data:
  pgadmin_data:
