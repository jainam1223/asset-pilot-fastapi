# Single compose file for both local environments this project has:
# - `docker compose up -d` (default) builds/runs the `dev` Dockerfile
#   stage — hot reload, bind-mounted source, dev+prod deps.
# - `BUILD_TARGET=runtime docker compose up -d --build` builds/runs the
#   same `runtime` stage that ships to ACR (gunicorn + uvicorn workers,
#   non-root, prod deps only) to exercise the production image shape
#   locally. The bind mounts below still overlay host source onto it, so
#   this checks the prod process model/deps/permissions, not a fully
#   immutable artifact — for that, run the built image directly with no
#   compose volumes.
# Either way, config comes from the same single `.env` (local dev only —
# see README "Environment configuration"). Real production (Azure
# Container Apps/App Service) doesn't use this file at all: it pulls the
# `runtime` image from ACR directly and gets its env vars/secrets
# (including Key Vault references) injected by the platform.
x-common-env: &common-env
  env_file:
    - .env

services:
  api:
    image: asset-pilot-fastapi-api:${BUILD_TARGET:-dev}
    build:
      context: .
      dockerfile: Dockerfile
      target: ${BUILD_TARGET:-dev}
    <<: *common-env
    environment:
      REDIS_HOST: redis
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      - ./app:/app/app
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
      - ./tests:/app/tests
      - ./scripts:/app/scripts
      - ./pyproject.toml:/app/pyproject.toml
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health/live', timeout=3).status == 200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      # REDIS_HOST_PORT (not REDIS_PORT) controls the HOST-side port —
      # same reasoning as DATABASE_HOST_PORT above. Defaults to 6380
      # since a local Redis install commonly already holds 6379.
      - "${REDIS_HOST_PORT:-6380}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  redis-commander:
    image: rediscommander/redis-commander:latest
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis
    profiles: ["tools"]
    restart: unless-stopped

volumes:
  redis_data:
